{% set name = "apache-airflow-providers-ydb" %}
{% set version = "2.3.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/apache_airflow_providers_ydb-{{ version }}.tar.gz
  sha256: d5c46b7ee8f88c8ae31188c36fd75d4963da95c0e5952b142b649fa7eb8fa32d

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - flit-core ==3.12.0
    - pip
  run:
    - apache-airflow-providers-common-compat >=1.10.1
    - python >={{ python_min }},<3.13
    - apache-airflow >=2.11.0
    # more restrictive for python <3.13
    - apache-airflow-providers-common-sql >=1.20.0
    # more restrictive for python <3.13
    - ydb >=3.18.8
    # more restrictive for python <3.13
    - ydb-dbapi >=0.1.0

test:
  imports:
    - airflow.providers.ydb
  commands:
    - pip check
  requires:
    - python {{ python_min }}
    - pip

about:
  home: https://github.com/apache/airflow/
  summary: Provider package apache-airflow-providers-ydb for Apache Airflow
  license: Apache-2.0
  license_file:
    - LICENSE
    - NOTICE
  license_family: Apache
  doc_url: https://airflow.apache.org/docs/apache-airflow-providers-ydb/stable/index.html
  dev_url: https://github.com/apache/airflow/

extra:
  recipe-maintainers:
    - xylar
